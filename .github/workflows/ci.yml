name: CI

# Builds the Next.js project and uploads the production build as a
# downloadable GitHub artifact.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: {}

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Matches the project's Node 18 constraint (Next 14 needs >= 18.17).
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # - name: Lint
      #   run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          # .next is a dotfile dir; upload-artifact@v4 excludes hidden files by
          # default, so opt in or the upload finds nothing.
          include-hidden-files: true
          # The Next.js build output, minus the local build cache.
          path: |
            .next
            !.next/cache
          if-no-files-found: error
          retention-days: 7
