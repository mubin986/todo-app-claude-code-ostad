name: Feature request
description: Suggest a new feature or improvement for the todo app or feedback tool.
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe the problem you're trying to solve — not
        just the solution — so we can weigh it against other work.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The pain point or gap you're hitting today.
      placeholder: I lose track of which todos are overdue because there are no due dates.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
      placeholder: Add an optional due date per todo, with overdue ones shown in red.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      options:
        - Todo app (home page)
        - Feedback widget
        - Feedback review page (/feedback)
        - Other / cross-cutting
    validations:
      required: true
